{% extends "base.html" %}
{% block title %}{{ trans(key="tags", lang=lang) }} | {{ config.title }}{% endblock title %}
{% block content %}
<h1>{{ trans(key="tags", lang=lang) }}</h1>
{% for term in terms %}
<p><a href="{{ term.permalink }}">#{{ term.name }}</a> ({{ term.pages | length }})</p>
{% endfor %}
{% endblock content %}
