base_url = "https://avel.llll-ll.com"
title = "avel homepage (sample)"
description = "An ultra-lightweight, no-JS Zola blog theme inspired by Hiroshi Abe's famously lightweight official homepage."
default_language = "en"
compile_sass = false
generate_feeds = true
feed_filenames = ["atom.xml"]
minify_html = true

[markdown]
lazy_async_image = true
external_links_target_blank = true

[markdown.highlighting]
enabled = true
theme = "Nord"

[[taxonomies]]
name = "tags"
url = "tags"
feed = false

[translations]
home = "Home"
posts = "Posts"
archive = "Archive"
tags = "Tags"
latest_news = "Latest News"
more_posts = "More posts"
contact = "Contact"
atom = "Atom"
related_posts = "Related posts"
previous = "Previous"
next = "Next"
share_hatena = "Hatena Bookmark"
comments = "Comments"
comment_hint = "Click to comment"
profile_text = "A sample site for the avel Zola theme."
date_format = "%B %d, %Y"

[languages.ja]
title = "avel のホームページ（サンプル）"
description = "とにかく表示が速い、no-JS の Zola ブログテーマ（阿部寛のホームページへのリスペクト）"
generate_feeds = true
taxonomies = [
  { name = "tags", url = "tags", feed = false },
]

[languages.ja.translations]
home = "トップ"
posts = "記事一覧"
archive = "アーカイブ"
tags = "タグ一覧"
latest_news = "最新情報"
more_posts = "記事一覧をもっと見る"
contact = "連絡先"
atom = "Atom"
related_posts = "関連記事"
previous = "前の記事"
next = "次の記事"
share_hatena = "はてなブックマーク"
comments = "Comments"
comment_hint = "クリックで書き込めます"
profile_text = "Zola テーマ avel のサンプルサイトです。"
date_format = "%Y年%m月%d日"

[extra]
