base_url = "https://avel.llll-ll.com"
title = "avel"
description = "A minimal, no-JS blog powered by Zola"
default_language = "ja"
compile_sass = false
generate_feeds = true
feed_filenames = ["atom.xml"]
minify_html = true

[markdown]

[[taxonomies]]
name = "tags"
url = "tags"
feed = false
lang = "ja"

[extra]
# --- プロフィール ---
name = "avel demo"
profile_image = "avatar.svg"
profile_width = "120"
profile_height = "120"

# --- 背景 ---
background_image = "bg.svg"
# body_bg = "#ffffff"             # 背景画像なしのときの背景色

# --- レイアウト ---
# nav_width = "18%"               # サイドバー幅（デフォルト: 18%）
# nav_bg = "#9999cc"              # サイドバー背景色（デフォルト: #9999cc）
nav_bullet = "■"                  # ナビ項目の先頭記号（デフォルト: なし）例: ■ ● ▶
# main_padding = "1em"            # メインエリアの余白
# max_width = "960px"             # ページ全体の最大幅
# content_align = "left"         # 本文の文字揃え: left / center / justify
# line_height = "1.5"            # 行間（デフォルト: 1.5）

# --- フォント ---
# font = "sans-serif"             # serif / sans-serif / monospace（総称ファミリー）
# font_family = ""                # 具体的な書体名（システムフォントのみなら外部読み込みなし）
# google_fonts_url = ""           # Google Fonts の URL
# font_size = "13px"              # ベースフォントサイズ（デフォルト: 13px）

# --- リンク色 ---
# link_color = "#0000cc"          # リンクの色
# link_visited = "#551a8b"        # 訪問済みリンクの色

# --- 日付 ---
date_format = "%Y年%m月%d日"

# --- フッター ---
# footer = "© Your Name"

# --- OGP ---
# og_image = "og.webp"

# --- ナビゲーション ---
nav = [
  { label = "トップ", url = "/" },
  { label = "記事一覧", url = "/posts/" },
  { label = "タグ一覧", url = "/tags/" },
  { label = "GitHub", url = "https://github.com/kako-jun/avel" },
]
