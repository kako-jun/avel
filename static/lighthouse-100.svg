<svg xmlns="http://www.w3.org/2000/svg" width="600" height="180" viewBox="0 0 600 180" font-family="Arial,Helvetica,sans-serif" role="img" aria-label="Lighthouse scores: Performance 100, Accessibility 100, Best Practices 100, SEO 100">
  <rect width="600" height="180" fill="#ffffff"/>
  <g>
    <!-- Performance -->
    <circle cx="90"  cy="70" r="46" fill="none" stroke="#e8f5e9" stroke-width="8"/>
    <circle cx="90"  cy="70" r="46" fill="none" stroke="#0cce6b" stroke-width="8" stroke-linecap="round" transform="rotate(-90 90 70)" pathLength="100" stroke-dasharray="100 100"/>
    <text x="90"  y="78" text-anchor="middle" font-size="30" font-weight="bold" fill="#0a7f43">100</text>
    <text x="90"  y="138" text-anchor="middle" font-size="14" fill="#333333">Performance</text>
    <!-- Accessibility -->
    <circle cx="230" cy="70" r="46" fill="none" stroke="#e8f5e9" stroke-width="8"/>
    <circle cx="230" cy="70" r="46" fill="none" stroke="#0cce6b" stroke-width="8" stroke-linecap="round" transform="rotate(-90 230 70)" pathLength="100" stroke-dasharray="100 100"/>
    <text x="230" y="78" text-anchor="middle" font-size="30" font-weight="bold" fill="#0a7f43">100</text>
    <text x="230" y="138" text-anchor="middle" font-size="14" fill="#333333">Accessibility</text>
    <!-- Best Practices -->
    <circle cx="370" cy="70" r="46" fill="none" stroke="#e8f5e9" stroke-width="8"/>
    <circle cx="370" cy="70" r="46" fill="none" stroke="#0cce6b" stroke-width="8" stroke-linecap="round" transform="rotate(-90 370 70)" pathLength="100" stroke-dasharray="100 100"/>
    <text x="370" y="78" text-anchor="middle" font-size="30" font-weight="bold" fill="#0a7f43">100</text>
    <text x="370" y="138" text-anchor="middle" font-size="14" fill="#333333">Best Practices</text>
    <!-- SEO -->
    <circle cx="510" cy="70" r="46" fill="none" stroke="#e8f5e9" stroke-width="8"/>
    <circle cx="510" cy="70" r="46" fill="none" stroke="#0cce6b" stroke-width="8" stroke-linecap="round" transform="rotate(-90 510 70)" pathLength="100" stroke-dasharray="100 100"/>
    <text x="510" y="78" text-anchor="middle" font-size="30" font-weight="bold" fill="#0a7f43">100</text>
    <text x="510" y="138" text-anchor="middle" font-size="14" fill="#333333">SEO</text>
  </g>
  <text x="300" y="170" text-anchor="middle" font-size="13" fill="#666666">Lighthouse 100 / 100 / 100 / 100</text>
</svg>
